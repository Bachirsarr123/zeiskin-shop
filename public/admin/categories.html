      <a href="/admin/products.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Produits</a>
      <a href="/admin/categories.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Catégories</a>
      <a href="/admin/orders.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="16" width="18" height="4" rx="2"/><path d="M5 16v-3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/><path d="M9 11V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>Commandes</a>
      <a href="/admin/faq.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>FAQ</a>
      <p class="nav-section-title">Configuration</p>
      <a href="/admin/settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Paramètres</a>

    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-title"><h1>Catégories</h1><p id="categories-count">—</p></div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="AdminCategories.openAdd()">+ Ajouter une catégorie</button>
      </div>
    </div>
    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Image</th><th>Nom</th><th>Description</th><th>Produits</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="categories-tbody">
              <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted)">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="category-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <p class="modal-title" id="modal-title">Ajouter une catégorie</p>
      <button class="modal-close" onclick="AdminCategories.closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="category-form">
        <div class="form-group">
          <label class="form-label required">Nom</label>
          <input class="form-input" type="text" id="cat-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="cat-desc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Image (optionnel)</label>
          <input type="file" id="cat-image" accept="image/*" class="form-input">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="AdminCategories.closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="AdminCategories.saveCategory()">Sauvegarder</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/admin/auth.js"></script>
<script src="/js/admin/categories.js"></script>
</body>
</html>
