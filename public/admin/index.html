<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ZEISKIN</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">Zeiskin</div>
      <div class="sub">Administration</div>
    </div>
    <p class="login-title">Connexion au tableau de bord</p>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Identifiant</label>
        <input class="form-input" type="text" id="username" autocomplete="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary btn-full" type="submit" style="margin-top:8px">Se connecter</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.8rem;color:var(--muted)">
      <a href="/" style="color:var(--terracotta)">← Retour à la boutique</a>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin/auth.js"></script>
</body>
</html>
