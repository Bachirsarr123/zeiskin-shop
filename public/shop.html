<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique — ZEISKIN</title>
  <meta name="description" content="Tous les produits de soins naturels ZEISKIN. Baumes lèvres, gommages corps, huiles et coffrets. Livraison au Sénégal.">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .shop-layout { display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:start; }
    @media(max-width:900px){ .shop-layout{grid-template-columns:1fr;} }
    .filters-sidebar { background:var(--white);border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);border:1px solid var(--border);position:sticky;top:96px; }
    @media(max-width:900px){ .filters-sidebar{display:none;} .filters-sidebar.open{display:block;} }
    .filter-section { margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:20px; }
    .filter-section:last-child{border-bottom:none;margin-bottom:0;}
    .filter-title{font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--charcoal);margin-bottom:12px;}
    .filter-chip{display:block;width:100%;text-align:left;padding:8px 12px;border:none;border-radius:6px;font-size:.875rem;cursor:pointer;transition:all .2s;background:transparent;color:var(--charcoal);}
    .filter-chip:hover{background:var(--blush);}
    .filter-chip.active{background:var(--charcoal);color:white;}
    .sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap;}
    .sort-bar select{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;background:var(--white);cursor:pointer;font-family:var(--font-body);}
    .sort-bar select:focus{outline:none;border-color:var(--terracotta);}
    .price-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
    .price-inputs input{padding:8px;border:1.5px solid var(--border);border-radius:6px;font-size:.8rem;text-align:center;}
    .price-inputs input:focus{outline:none;border-color:var(--terracotta);}
    .mobile-filters-bar{display:none;}
    @media(max-width:900px){.mobile-filters-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}}
    .shop-search{width:100%;padding:10px 16px 10px 40px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:var(--font-body);background:var(--white);}
    .shop-search:focus{outline:none;border-color:var(--terracotta);}
    .search-wrap-shop{position:relative;margin-bottom:16px;}
    .search-wrap-shop svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;color:var(--muted);pointer-events:none;}
    .pagination{display:flex;gap:6px;justify-content:center;margin-top:40px;}
    .page-btn{min-width:36px;height:36px;padding:0 8px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;background:var(--white);cursor:pointer;transition:all .2s;}
    .page-btn:hover{border-color:var(--terracotta);color:var(--terracotta);}
    .page-btn.active{background:var(--terracotta);border-color:var(--terracotta);color:white;}
    .page-btn:disabled{opacity:.4;cursor:not-allowed;}
    .hidden{display:none!important;}
    .product-card__body{text-decoration:none;display:block;}
  </style>
</head>
<body>
<header class="site-header" id="site-header">
  <div class="container header-inner">
    <nav class="header-nav">
      <ul>
        <li><a href="/">Accueil</a></li>
        <li><a href="/shop.html" class="active">Boutique</a></li>
        <li><a href="/#categories">Catégories</a></li>
        <li><a href="/admin/" style="opacity: 0.3; font-size: 0.65rem; margin-left: 10px; display: inline-block;">ZT</a></li>
      </ul>
    </nav>
    <a href="/" class="header-logo" style="justify-self:center"><span class="logo-text">Zeiskin</span></a>
    <div class="header-actions">
      <button class="icon-btn" data-search-open title="Rechercher">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" data-cart-open id="cart-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<nav class="mobile-nav" id="mobile-nav">
  <a href="/">Accueil</a>
  <a href="/shop.html">Boutique</a>
  <a href="/#categories">Catégories</a>
  <a href="/admin/" style="opacity: 0.2; font-size: 0.7rem; margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px;">ZT Admin</a>
</nav>

<main style="padding-top:calc(var(--header-h) + 40px);min-height:100vh">
  <div class="container">
    <!-- Page title -->
    <div style="margin-bottom:32px">
      <h1 style="font-family:var(--font-display);font-size:2.5rem;font-weight:300;margin-bottom:8px">Boutique</h1>
      <p id="products-count" style="color:var(--muted);font-size:.875rem"></p>
    </div>

    <!-- Mobile filter bar -->
    <div class="mobile-filters-bar">
      <button class="btn btn-outline btn-sm" id="filters-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Filtres
      </button>
      <div id="category-filters" style="display:flex;gap:8px;flex-wrap:wrap;overflow-x:auto"></div>
    </div>

    <div class="shop-layout">
      <!-- Sidebar Filters -->
      <aside class="filters-sidebar" id="filters-sidebar">
        <div class="filter-section">
          <p class="filter-title">Catégories</p>
          <div id="category-filters-desktop"></div>
        </div>
        <div class="filter-section">
          <p class="filter-title">Prix (FCFA)</p>
          <div class="price-inputs">
            <input type="number" id="min-price" placeholder="Min">
            <input type="number" id="max-price" placeholder="Max">
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" id="apply-price" style="flex:1">Appliquer</button>
            <button class="btn btn-outline btn-sm" id="reset-price">✕</button>
          </div>
        </div>
      </aside>

      <!-- Products -->
      <div>
        <!-- Sort + Search bar -->
        <div class="sort-bar">
          <div class="search-wrap-shop" style="flex:1;max-width:340px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="shop-search" id="shop-search" placeholder="Rechercher un produit...">
          </div>
          <select id="sort-select" aria-label="Trier par">
            <option value="newest">Nouveautés</option>
            <option value="price_asc">Prix croissant</option>
            <option value="price_desc">Prix décroissant</option>
            <option value="popular">Populaires</option>
          </select>
        </div>

        <div class="products-grid" id="products-grid"></div>
        <div id="pagination" class="pagination"></div>
      </div>
    </div>
  </div>
</main>

<!-- Side Cart + Footer identique à index -->
<div class="cart-overlay" id="cart-overlay"></div>
<aside class="side-cart" id="side-cart">
  <div class="cart-header">
    <h3>Mon Panier</h3>
    <button class="cart-close" id="cart-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div id="cart-empty" class="cart-empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <p>Votre panier est vide</p>
    <a href="/shop.html" class="btn btn-outline btn-sm">Parcourir la boutique</a>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer hidden" id="cart-footer">
    <div class="cart-total"><span>Total</span><span class="total-amount" id="cart-total-amount">0 FCFA</span></div>
    <button class="btn btn-wa btn-full" id="whatsapp-checkout-btn">
      <svg viewBox="0 0 24 24" fill="currentColor" style="width:22px;height:22px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
      Commander via WhatsApp
    </button>
    <p class="cart-note">Redirigé vers WhatsApp pour finaliser</p>
  </div>
</aside>

<a href="https://wa.me/221703046152?text=Bonjour%20ZEISKIN%20%F0%9F%8C%BF" class="wa-fab" target="_blank" title="Support WhatsApp">
  <span class="wa-pulse"></span>
  <span class="wa-fab-tooltip">Support WhatsApp</span>

</a>
<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/shop.js"></script>
<script>
  // Hook desktop category filters to ShopPage
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const desktop = document.getElementById('category-filters-desktop');
      if (desktop && ShopPage.categories) {
        desktop.innerHTML = `<button class="filter-chip ${!ShopPage.filters.category?'active':''}" data-cat="" onclick="filterByCategory('')">Toutes</button>` +
          ShopPage.categories.map(c => `<button class="filter-chip ${ShopPage.filters.category===c._id?'active':''}" data-cat="${c._id}" onclick="filterByCategory('${c._id}')">${c.name}</button>`).join('');
      }
    }, 1000);
  });
  function filterByCategory(catId) {
    ShopPage.filters.category = catId;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === catId));
    ShopPage.loadProducts(1);
  }
</script>
</body>
</html>
