<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produit — ZEISKIN</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .product-page { padding-top: calc(var(--header-h) + 40px); min-height:100vh; }
    .breadcrumb { font-size:.78rem; color:var(--muted); margin-bottom:32px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .breadcrumb a:hover { color:var(--terracotta); }
    .breadcrumb span { color:var(--charcoal); }
    #product-main { display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:start; margin-bottom:80px; }
    @media(max-width:900px){ #product-main { grid-template-columns:1fr; gap:32px; } }
    .related-section { background:var(--blush); padding:60px 0; }
    .hidden{display:none!important;}
    .product-card__body{text-decoration:none;display:block;}
  </style>
</head>
<body>
<header class="site-header" id="site-header">
  <div class="container header-inner">
    <nav class="header-nav">
      <ul>
        <li><a href="/">Accueil</a></li>
        <li><a href="/shop.html">Boutique</a></li>
        <li><a href="/admin/" style="opacity: 0.3; font-size: 0.65rem; margin-left: 10px; display: inline-block;">ZT</a></li>
      </ul>
    </nav>
    <a href="/" class="header-logo" style="justify-self:center"><span class="logo-text">Zeiskin</span></a>
    <div class="header-actions">
      <button class="icon-btn" data-search-open>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" data-cart-open id="cart-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<nav class="mobile-nav" id="mobile-nav">
  <a href="/">Accueil</a>
  <a href="/shop.html">Boutique</a>
  <a href="/admin/" style="opacity: 0.2; font-size: 0.7rem; margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px;">ZT Admin</a>
</nav>

<main class="product-page">
  <div class="container">
    <nav class="breadcrumb" id="breadcrumb">
      <a href="/">Accueil</a><span>/</span><a href="/shop.html">Boutique</a>
    </nav>
    <div id="product-main">
      <!-- Chargé par product.js -->
    </div>
  </div>

  <!-- Related Products -->
  <section class="related-section" id="related-section">
    <div class="container">
      <div class="section-header">
        <span class="section-label">Vous aimerez aussi</span>
        <h2>Produits similaires</h2>
        <div class="section-divider"></div>
      </div>
      <div class="products-grid" id="related-grid"></div>
    </div>
  </section>
</main>

<!-- Side Cart -->
<div class="cart-overlay" id="cart-overlay"></div>
<aside class="side-cart" id="side-cart">
  <div class="cart-header">
    <h3>Mon Panier</h3>
    <button class="cart-close" id="cart-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div id="cart-empty" class="cart-empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <p>Votre panier est vide</p>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer hidden" id="cart-footer">
    <div class="cart-total"><span>Total</span><span class="total-amount" id="cart-total-amount">0 FCFA</span></div>
    <button class="btn btn-wa btn-full" id="whatsapp-checkout-btn">

      Commander via WhatsApp
    </button>
    <p class="cart-note">Redirigé vers WhatsApp pour finaliser</p>
  </div>
</aside>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/product.js"></script>
</body>
</html>
